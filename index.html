<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球手机市场资讯</title>
  <style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    color: #222;
    min-height: 100vh;
  }
  .topbar {
    background: linear-gradient(135deg, #0f62fe 0%, #1e88ff 100%);
    color: white;
    padding: 20px 30px;
    font-size: 24px;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(15,98,254,0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .update-time {
    font-size: 14px;
    opacity: 0.95;
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 20px;
  }
  .container {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 30px;
    padding: 30px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .news-section, .tags-section {
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    overflow: hidden;
  }
  .news-section { min-height: 800px; }
  #news-container, #tags-container {
    padding: 30px;
  }
  .item {
    border-bottom: 1px solid #f0f0f0;
    padding: 25px 0;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .card-news {
  display: flex;
  gap: 15px;
  padding: 20px 0;
  border-bottom: 1px solid #eee;
  cursor: pointer;
}

.card-news:hover {
  background: #f8fbff;
}

.card-img {
  width: 120px;
  height: 80px;
  border-radius: 10px;
  object-fit: cover;
}

.card-content {
  flex: 1;
}

.category {
  font-size: 12px;
  color: #0f62fe;
  font-weight: 600;
}
  .item:hover {
    background: linear-gradient(90deg, #f8faff 0%, #e3f2fd 100%);
    transform: translateX(5px);
  }
  .source {
    display: inline-block;
    background: linear-gradient(135deg, #e8f0ff 0%, #d1e0ff 100%);
    color: #0f62fe;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 12px;
  }
  .headline {
    font-size: 18px;
    font-weight: 600;
    margin: 12px 0;
    line-height: 1.5;
    color: #1a1a1a;
  }
  .meta {
    font-size: 13px;
    color: #666;
    margin-bottom: 10px;
  }
  .summary {
    color: #555;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 15px;
  
    display: -webkit-box;
    -webkit-line-clamp: 3;   /* 显示3行 */
    -webkit-box-orient: vertical;
    overflow: hidden;
  }
  .tag {
    display: inline-block;
    background: #f8f9fa;
    color: #495057;
    border-radius: 15px;
    padding: 5px 14px;
    font-size: 13px;
    margin: 5px 8px 0 0;
    border: 1px solid #e9ecef;
  }
  .report .source {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }
  .report .tag { background: #e8d5f1; }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #999;
    font-size: 16px;
  }
  .tags-container .tag {
    display: block;
    margin: 10px 0;
    font-size: 14px;
  }
  
  /* 响应式 */
  @media (max-width: 1100px) {
    .container { 
      grid-template-columns: 1fr; 
      gap: 20px;
      padding: 20px;
    }
    .tags-section { order: 2; }
  }
  
  /* 动画 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .item { animation: fadeInUp 0.5s ease forwards; }
</style>
  
</head>
<body>
  <div class="topbar">
  全球手机市场资讯
  <div style="display:flex;gap:10px;align-items:center;">
    <span class="update-time">加载中...</span>
    <button onclick="resetFilter()" style="
      background:#ff6b6b;color:white;border:none;
      padding:6px 16px;border-radius:20px;
      font-size:13px;cursor:pointer;font-weight:500;
      box-shadow:0 2px 10px rgba(255,107,107,0.3);
    ">全部</button>
  </div>
</div>

  <div class="container">
    <!-- 新闻主区 -->
    <div class="news-section">
      <div id="news-container">
        <div class="loading">正在加载最新资讯...</div>
      </div>
    </div>
    
    <!-- 标签侧边栏 -->
    <div class="tags-section">
      <div id="tags-container" class="loading">加载中...</div>
    </div>
  </div>
</body>
  
  <!-- 右侧标签区（窄列） -->
  
</div>

  <script>
document.querySelector('.update-time').textContent = '加载中...';

async function loadData() {
  try {
    const response = await fetch('data.json?t=' + Date.now());
    const data = await response.json();

    document.querySelector('.update-time').textContent = 
      `最后更新：${data.updated} | ${data.news.length} 条资讯`;
    
    window.currentData = data;
    renderNews(data);
    renderTags(data);
  } catch (e) {
    const fallbackData = {
      updated: new Date().toLocaleString('zh-CN'),
      news: []
    };
    document.querySelector('.update-time').textContent = 
      `备用模式 | ${fallbackData.news.length} 条`;
    renderNews(fallbackData);
  }
}

function renderNews(data) {
  data.news.sort((a, b) => new Date(b.date) - new Date(a.date));
  
  const container = document.getElementById('news-container');
  container.innerHTML = '';
  
  // 标题 + 筛选状态
  const activeFilter = window.activeFilter || '全部';
  container.innerHTML = `
    <div style="display:flex;align-items:center;margin-bottom:25px;">
      <div style="font-size:20px;font-weight:600;color:#0f62fe;margin-right:20px;">最新资讯</div>
      <div style="background:#e8f0ff;color:#0f62fe;padding:8px 16px;border-radius:25px;font-size:14px;">
        ${activeFilter} (${data.news.length}条)
      </div>
    </div>
  `;
  
  data.news.forEach((item, index) => {
    const div = document.createElement('div');
    div.className = 'card-news';
  
    div.innerHTML = `
      <img 
        src="${item.image}" 
        class="card-img"
        loading="lazy"
        referrerpolicy="no-referrer"
        onerror="this.onerror=null;this.src='https://picsum.photos/120/80';">
      
      <div class="card-content">
        <div class="category">${item.tags[0] || '资讯'}</div>
        <div class="headline">${item.title}</div>
        <div class="meta">${item.source} · ${item.date}</div>
        <div class="summary">${item.summary}</div>
      </div>
    `;
  
    div.onclick = () => window.open(item.url, '_blank');
    container.appendChild(div);
  });
}

function renderTags(data) {
  const container = document.getElementById('tags-container');
  container.innerHTML = '';
  
  // 统计热门标签
  const tagCount = {};
  data.news.forEach(item => {
    item.tags.forEach(tag => {
      tagCount[tag] = (tagCount[tag] || 0) + 1;
    });
  });
  
  // 按热度排序前12个
  const topTags = Object.entries(tagCount)
    .sort(([,a], [,b]) => b - a)
    .slice(0, 12)
    .map(([tag, count]) => ({ tag, count }));
  
  topTags.forEach(({ tag, count }) => {
    const tagEl = document.createElement('div');
    tagEl.className = 'tag';
    tagEl.style.cursor = 'pointer';
    tagEl.style.margin = '12px 0';
    tagEl.style.padding = '10px 18px';
    tagEl.style.fontSize = '15px';
    tagEl.style.fontWeight = '500';
    tagEl.textContent = `${tag} (${count})`;
    tagEl.onclick = () => filterByTag(tag);
    container.appendChild(tagEl);
  });
}

function filterByTag(tag) {
  window.activeFilter = tag;
  
  if (window.currentData) {
    const filtered = {
      ...window.currentData,
      news: window.currentData.news.filter(item => 
        item.tags.includes(tag)
      )
    };
    renderNews(filtered);
  }
}

// 重置筛选
function resetFilter() {
  window.activeFilter = '全部';
  loadData();
}

// 加载 + 5分钟自动刷新
loadData();
setInterval(loadData, 5 * 60 * 1000);
document.addEventListener('DOMContentLoaded', function() {
  document.querySelector('.update-time').textContent = '初始化中...';
  loadData();
});
</script>
</body>
</html>
