<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>全球手机市场资讯</title>
  <style>
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    margin: 0;
    background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
    color: #222;
    min-height: 100vh;
  }
  .topbar {
    background: linear-gradient(135deg, #0f62fe 0%, #1e88ff 100%);
    color: white;
    padding: 20px 30px;
    font-size: 24px;
    font-weight: 600;
    box-shadow: 0 4px 20px rgba(15,98,254,0.3);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .update-time {
    font-size: 14px;
    opacity: 0.95;
    background: rgba(255,255,255,0.2);
    padding: 4px 12px;
    border-radius: 20px;
  }
  .container {
    display: grid;
    grid-template-columns: 1fr 320px;
    gap: 30px;
    padding: 30px;
    max-width: 1600px;
    margin: 0 auto;
  }
  .news-section, .tags-section {
    background: white;
    border-radius: 20px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.1);
    overflow: hidden;
  }
  .news-section { min-height: 800px; }
  #news-container, #tags-container {
    padding: 30px;
  }
  .item {
    border-bottom: 1px solid #f0f0f0;
    padding: 25px 0;
    cursor: pointer;
    transition: all 0.3s ease;
  }
  .item:hover {
    background: linear-gradient(90deg, #f8faff 0%, #e3f2fd 100%);
    transform: translateX(5px);
  }
  .source {
    display: inline-block;
    background: linear-gradient(135deg, #e8f0ff 0%, #d1e0ff 100%);
    color: #0f62fe;
    border-radius: 20px;
    padding: 6px 16px;
    font-size: 13px;
    font-weight: 500;
    margin-bottom: 12px;
  }
  .headline {
    font-size: 18px;
    font-weight: 600;
    margin: 12px 0;
    line-height: 1.5;
    color: #1a1a1a;
  }
  .meta {
    font-size: 13px;
    color: #666;
    margin-bottom: 10px;
  }
  .summary {
    color: #555;
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 15px;
  }
  .tag {
    display: inline-block;
    background: #f8f9fa;
    color: #495057;
    border-radius: 15px;
    padding: 5px 14px;
    font-size: 13px;
    margin: 5px 8px 0 0;
    border: 1px solid #e9ecef;
  }
  .report .source {
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    color: white;
  }
  .report .tag { background: #e8d5f1; }
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: #999;
    font-size: 16px;
  }
  .tags-container .tag {
    display: block;
    margin: 10px 0;
    font-size: 14px;
  }
  
  /* 响应式 */
  @media (max-width: 1100px) {
    .container { 
      grid-template-columns: 1fr; 
      gap: 20px;
      padding: 20px;
    }
    .tags-section { order: 2; }
  }
  
  /* 动画 */
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .item { animation: fadeInUp 0.5s ease forwards; }
</style>
  
</head>
<body>
  <div class="topbar">
    全球手机市场资讯
    <span class="update-time">加载中...</span>
  </div>

  <div class="container">
    <!-- 新闻主区 -->
    <div class="news-section">
      <div id="news-container">
        <div class="loading">正在加载最新资讯...</div>
      </div>
    </div>
    
    <!-- 标签侧边栏 -->
    <div class="tags-section">
      <div id="tags-container" class="loading">加载中...</div>
    </div>
  </div>
</body>
  
  <!-- 右侧标签区（窄列） -->
  <div class="card sidebar">
    <div class="title">热门标签</div>
    <div id="tags-container" class="loading">加载中...</div>
  </div>
</div>

  <script>
    async function loadData() {
      try {
        const response = await fetch('data.json');
        const data = await response.json();
        
        // 更新时间
        document.querySelector('.update-time').textContent = 
          `最后更新：${data.updated} | ${data.news.length} 条资讯`;
        
        // 显示新闻
        const container = document.getElementById('news-container');
        container.innerHTML = '<div class="title">最新资讯</div>';
        
        data.news.slice(0, 8).forEach(item => {
          const div = document.createElement('div');
          div.className = `item ${item.type === 'report' ? 'report' : ''}`;
          div.innerHTML = `
            <div class="source">${item.source}</div>
            <div class="headline">${item.title}</div>
            <div class="meta">${item.date}</div>
            <div class="summary">${item.summary}</div>
            ${item.tags.map(tag => `<div class="tag">${tag}</div>`).join('')}
          `;
          div.onclick = () => window.open(item.url, '_blank');
          container.appendChild(div);
        });
        
        // 显示标签
        const tagsContainer = document.getElementById('tags-container');
        const allTags = [...new Set(data.news.flatMap(n => n.tags))].slice(0, 8);
        tagsContainer.innerHTML = '<div class="title">热门标签</div>' + 
          allTags.map(tag => `<div class="tag sidebar-tag">${tag}</div>`).join('');
        
      } catch (e) {
        document.getElementById('news-container').innerHTML = 
          '<div class="title">最新资讯</div><div style="padding:20px;text-align:center;color:#999;">暂无数据，请稍后刷新</div>';
      }
    }
    
    loadData();
    setInterval(loadData, 5 * 60 * 1000); // 每5分钟检查更新
  </script>
</body>
</html>
