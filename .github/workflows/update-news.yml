name: 手机资讯更新

on:
  schedule:
    - cron: '30 8 * * *'   # 北京时间16:30
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: 生成最新资讯
      run: |
        cat > data.json << EOF
{
  "updated": "$(date '+%Y-%m-%d %H:%M')",
  "news": [
    {
      "title": "三星S27 Ultra发布",
      "source": "系统自动更新",
      "date": "$(date '+%Y-%m-%d')",
      "summary": "自动更新手机行业资讯",
      "url": "https://cindyhu198810.github.io/news-dashboard/",
      "tags": ["最新"],
      "type": "news"
    }
  ]
}
EOF

    - name: 提交更新
      run: |
        git config user.name "Auto Update"
        git config user.email "bot@news.com"
        git add data.json
        git commit -m "📱 更新手机资讯 $(date '+%Y-%m-%d')" || echo "无变化"
        git push
