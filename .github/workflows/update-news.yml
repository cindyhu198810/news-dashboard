name: 自动更新手机资讯

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 设置Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: 安装依赖
        run: pip install feedparser

      - name: 抓取新闻
        run: python scripts/fetch-news.py

      - name: 查看结果（调试）
        run: cat data.json

      - name: 提交更新
        run: |
          git config user.name "Auto News Bot"
          git config user.email "bot@news.com"
          git add data.json
          git commit -m "📱 自动更新30条手机资讯 $(date '+%Y-%m-%d %H:%M')" || echo "No changes"
          git push
