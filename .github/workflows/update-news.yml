name: 自动更新手机资讯

on:
  schedule:
    - cron: '30 8 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: 安装工具
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: 初始化JSON
        run: echo '{"updated":"","news":[]}' > data.json

      # =========================
      # GSMArena（10条）
      # =========================
      - name: 抓取 GSMArena
        run: |
          curl -s https://www.gsmarena.com/rss-news-reviews.php3 > feed.xml

          grep "<title>" feed.xml | tail -n +2 | head -10 | while read line
          do
            TITLE=$(echo $line | sed 's/<[^>]*>//g')

            jq --arg t "$TITLE" \
            '.news += [{
              "title":$t,
              "source":"GSMArena",
              "date":"'$(date +%Y-%m-%d)'",
              "summary":"手机行业资讯",
              "url":"https://www.gsmarena.com",
              "tags":["手机"],
              "type":"news"
            }]' data.json > tmp.json

            mv tmp.json data.json
          done

      # =========================
      # Android Authority（10条）
      # =========================
      - name: 抓取 Android Authority
        run: |
          curl -s https://www.androidauthority.com/feed/ > feed.xml

          grep "<title>" feed.xml | tail -n +2 | head -10 | while read line
          do
            TITLE=$(echo $line | sed 's/<[^>]*>//g')

            jq --arg t "$TITLE" \
            '.news += [{
              "title":$t,
              "source":"Android Authority",
              "date":"'$(date +%Y-%m-%d)'",
              "summary":"安卓资讯",
              "url":"https://www.androidauthority.com",
              "tags":["安卓"],
              "type":"news"
            }]' data.json > tmp.json

            mv tmp.json data.json
          done

      # =========================
      # PhoneArena（10条）
      # =========================
      - name: 抓取 PhoneArena
        run: |
          curl -s https://www.phonearena.com/rss/news > feed.xml

          grep "<title>" feed.xml | tail -n +2 | head -10 | while read line
          do
            TITLE=$(echo $line | sed 's/<[^>]*>//g')

            jq --arg t "$TITLE" \
            '.news += [{
              "title":$t,
              "source":"PhoneArena",
              "date":"'$(date +%Y-%m-%d)'",
              "summary":"手机新闻",
              "url":"https://www.phonearena.com",
              "tags":["手机"],
              "type":"news"
            }]' data.json > tmp.json

            mv tmp.json data.json
          done

      # 更新时间
      - name: 更新时间
        run: |
          jq '.updated="'$(date "+%Y-%m-%d %H:%M")'" | .news |= .[:30]' data.json > tmp.json
          mv tmp.json data.json

      # 提交
      - name: 提交更新
        run: |
          git config user.name "Auto News Bot"
          git config user.email "bot@news.com"
          git add data.json
          git commit -m "📱 自动更新30条手机资讯 $(date '+%Y-%m-%d %H:%M')" || echo "No changes"
          git push
