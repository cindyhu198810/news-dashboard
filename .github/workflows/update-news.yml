name: 自动更新手机资讯
on:
  schedule:
    - cron: '0 09 * * *'  # 每天北京时间09:00
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: 安装jq工具
      run: sudo apt-get update && sudo apt-get install -y jq
    
    - name: 生成20条最新资讯
      run: |
        cat > data.json << 'EOF'
